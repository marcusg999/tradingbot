# Railway deployment config. Set the ALPACA_* and safety-gate env vars in the
# Railway dashboard (Variables tab) — never commit them.
#
# This is a long-running worker (no exposed port). Railway sends SIGTERM on
# redeploy; main.py handles it gracefully and leaves stops live at Alpaca.

[build]
builder = "dockerfile"

[deploy]
startCommand = "python main.py"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
numReplicas = 1

# Recommended: attach a persistent volume so state.db / trades.csv survive
# redeploys, then point STATE_DB_PATH / TRADES_CSV_PATH at the mount.
#   Mount path: /app/data
#   STATE_DB_PATH=/app/data/state.db
#   TRADES_CSV_PATH=/app/data/trades.csv
